name: rpg_game
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  audioplayers: ^5.2.1

  # permissão de geolocalização
  geolocator: ^12.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  permission_handler: ^11.3.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

  # Gerenciamento de estado
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/music/
    - assets/audio/
    - assets/images/icons/
   